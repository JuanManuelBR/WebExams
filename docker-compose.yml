services:
  # ─── Base de datos ───
  mysql:
    image: mysql:8.0
    container_name: webexams-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      # Crea la primera DB; las otras 2 las creamos vía init script
      MYSQL_DATABASE: webexams_users
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - webexams
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # No expone puerto al host por default; descomenta para conectar con MySQL Workbench
    # ports:
    #   - "127.0.0.1:3306:3306"

  # ─── Microservicio Users (auth) ───
  users:
    build:
      context: ./server/Users
      dockerfile: Dockerfile
    container_name: webexams-users
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: webexams_users
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      EXAMS_MS_URL: http://exams:3001
      FRONTEND_URL: ${FRONTEND_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    networks:
      - webexams

  # ─── Microservicio Exams (gestión de exámenes + uploads) ───
  exams:
    build:
      context: ./server/Exams
      dockerfile: Dockerfile
    container_name: webexams-exams
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: webexams
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      SERVICE_SECRET: ${SERVICE_SECRET}
      USERS_MS_URL: http://users:3000
      EXAM_ATTEMPTS_MS_URL: http://attempts:3002
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - webexams

  # ─── Microservicio ExamsAttempts (intentos + emails) ───
  attempts:
    build:
      context: ./server/ExamsAttempts
      dockerfile: Dockerfile
    container_name: webexams-attempts
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: webexamsattempts
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      SERVICE_SECRET: ${SERVICE_SECRET}
      USER_MS_URL: http://users:3000
      EXAM_MS_URL: http://exams:3001
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_FROM: ${SMTP_FROM}
    networks:
      - webexams

  # ─── Nginx (sirve frontend + proxy a APIs) ───
  nginx:
    image: nginx:alpine
    container_name: webexams-nginx
    restart: unless-stopped
    depends_on:
      - users
      - exams
      - attempts
    ports:
      # Solo expuesto en localhost del host. El Nginx del host (con SSL) hace
      # proxy a este puerto. Para deploy sin SSL puedes cambiar a "80:80".
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    networks:
      - webexams

networks:
  webexams:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
