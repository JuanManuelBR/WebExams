# Nginx interno del docker compose stack
# Sirve frontend estático y hace proxy a los 3 microservicios.

upstream users   { server users:3000; }
upstream exams   { server exams:3001; }
upstream attempts { server attempts:3002; }

server {
    listen 80;
    server_name _;

    # Tamaño máximo de upload (PDFs de exámenes)
    client_max_body_size 50M;

    # ── Frontend estático (build de Vite) ──
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cachear assets estáticos
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy a microservicios ──
    location /api/users/ {
        proxy_pass http://users;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/exams/ {
        proxy_pass http://exams;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/images/ {
        proxy_pass http://exams;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/pdfs/ {
        proxy_pass http://exams;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # /api/exam/ (singular) → ExamsAttempts
    location /api/exam/ {
        proxy_pass http://attempts;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket de socket.io (ExamsAttempts)
    location /socket.io/ {
        proxy_pass http://attempts;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
